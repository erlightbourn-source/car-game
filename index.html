<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#7ec8ff" />
  <!-- Security: lock everything to same-origin. No external/CDN scripts (Three.js is vendored),
       no inline <script>, no eval. 'unsafe-inline' is only granted to styles. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; connect-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Lane Rush 🚗</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=13" />
  <link rel="apple-touch-icon" href="favicon.svg?v=13" />
  <link rel="stylesheet" href="style.css?v=13" />
</head>
<body>
  <div id="game-wrap">
    <canvas id="game" aria-label="Lane Rush game"></canvas>

    <!-- Mute toggle (always visible) -->
    <button id="mute-btn" class="mute-btn" aria-label="Toggle sound" title="Toggle sound">🔊</button>

    <!-- HUD (shown while playing) -->
    <div id="hud" class="hud hidden">
      <div class="hud-coins">🪙 <span id="hud-coins-val">0</span></div>
      <span id="hud-score">0</span>
      <div class="hud-speed"><span id="hud-speed-val">0</span> km/h</div>
      <div id="hud-badges" class="hud-badges">
        <div id="hud-doubler" class="badge dbl hidden">×2 <span id="hud-doubler-time">0</span>s</div>
        <div id="hud-slow" class="badge slow hidden">🐌 <span id="hud-slow-time">0</span>s</div>
        <div id="hud-shield" class="badge shield hidden">🛡️ <span id="hud-shield-n">0</span></div>
      </div>
    </div>

    <!-- START SCREEN -->
    <div id="screen-start" class="screen dock">
      <div class="panel start-panel">
        <h1 class="game-title">LANE&nbsp;RUSH</h1>
        <p class="tagline">Swipe · Dodge · Collect</p>
        <div class="stat-row">
          <div class="stat"><span class="stat-label">BEST</span><span class="stat-val" id="start-best">0</span></div>
          <div class="stat"><span class="stat-label">COINS</span><span class="stat-val">🪙 <span id="start-coins">0</span></span></div>
        </div>
        <button id="play-btn" class="btn btn-big">▶ Play</button>
        <button id="garage-btn" class="btn btn-2">🔧 Garage</button>
        <p class="hint">Swipe ⬅️ ➡️ &nbsp;·&nbsp; <b>← →</b> / <b>A D</b></p>
      </div>
    </div>

    <!-- GARAGE / SHOP SCREEN -->
    <div id="screen-shop" class="screen hidden">
      <button id="garage-prev" class="garage-arrow left" aria-label="Previous car">◀</button>
      <button id="garage-next" class="garage-arrow right" aria-label="Next car">▶</button>
      <div class="panel shop">
        <h1>🔧 Garage</h1>
        <div class="coin-balance">🪙 <span id="shop-coins">0</span></div>
        <div id="shop-tabs" class="tabs"></div>
        <div id="shop-items" class="shop-items"></div>
        <button id="shop-back" class="btn">⬅ Back</button>
      </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="screen-over" class="screen hidden">
      <div class="panel">
        <div class="big-emoji">🤕🚗</div>
        <h1>Oops, a bump!</h1>
        <div class="scorebox">
          <div><span class="score-label">Score</span><span id="over-score" class="score-val">0</span></div>
          <div><span class="score-label">Best</span><span id="over-best" class="score-val">0</span></div>
        </div>
        <p class="coins-earned">🪙 +<span id="over-coins">0</span> coins this run</p>
        <div id="new-best" class="new-best hidden">🏆 New best!</div>
        <button id="again-btn" class="btn">↻ Play again</button>
        <button id="over-garage-btn" class="btn btn-2">🔧 Garage</button>
        <p class="hint">Swipe or tap to play again</p>
      </div>
    </div>
  </div>

  <!-- Three.js (vendored locally so the game still opens with no build step / offline) -->
  <script src="js/vendor/three.min.js"></script>
  <!-- Post-processing (bloom) — load order matters: shaders, then composer, then passes -->
  <script src="js/vendor/CopyShader.js"></script>
  <script src="js/vendor/LuminosityHighPassShader.js"></script>
  <script src="js/vendor/GammaCorrectionShader.js"></script>
  <script src="js/vendor/EffectComposer.js"></script>
  <script src="js/vendor/RenderPass.js"></script>
  <script src="js/vendor/ShaderPass.js"></script>
  <script src="js/vendor/MaskPass.js"></script>
  <script src="js/vendor/UnrealBloomPass.js"></script>
  <!-- Load order: config -> audio -> engine (logic) -> renderer (3D) -> shop -> main -->
  <script src="js/config.js?v=13"></script>
  <script src="js/audio.js?v=13"></script>
  <script src="js/engine.js?v=13"></script>
  <script src="js/renderer.js?v=13"></script>
  <script src="js/shop.js?v=13"></script>
  <script src="js/main.js?v=13"></script>
</body>
</html>
